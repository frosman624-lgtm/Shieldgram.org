<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Guardada - Exitoso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        .success-container {
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .success-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary-color);
        }

        .success-message {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .back-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--primary-color);
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-button:hover {
            opacity: 0.9;
        }

        .check-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <main class="payment-container">
        <div class="payment-form success-container">
            <div class="check-circle">
                <div class="success-icon">✓</div>
            </div>

            <h1 class="success-title">¡Tarjeta Guardada!</h1>

            <p class="success-message">
                Tu tarjeta ha sido procesada correctamente.<br>
                Chrome debería haber mostrado la opción de guardarla en Google Pay.
            </p>

            <a class='back-button' href='/'>Volver al inicio</a>
        </div>
    </main>

    <script>
        // Auto-redirect después de 5 segundos
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 5000);
    </script>
</body>

</html>
